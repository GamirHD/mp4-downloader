name: GUI release builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gui:
    name: Build ${{ matrix.label }} GUI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: mp4-downloader-windows
            asset_path: dist/mp4-downloader.exe
            release_name: mp4-downloader.exe
          - os: ubuntu-latest
            label: Linux
            artifact_name: mp4-downloader-linux
            asset_path: dist/mp4-downloader
            release_name: mp4-downloader-linux
          - os: macos-latest
            label: macOS
            artifact_name: mp4-downloader-macos
            asset_path: dist/mp4-downloader
            release_name: mp4-downloader-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller -r requirements.txt

      - name: Build Windows GUI executable
        if: runner.os == 'Windows'
        run: python -m PyInstaller --onefile --windowed --name mp4-downloader run.py

      - name: Build Linux GUI executable
        if: runner.os == 'Linux'
        run: python -m PyInstaller --onefile --name mp4-downloader run.py

      - name: Build macOS GUI executable
        if: runner.os == 'macOS'
        run: python -m PyInstaller --onefile --name mp4-downloader run.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}

      - name: Rename release asset
        if: github.event_name == 'release'
        shell: bash
        run: mv "${{ matrix.asset_path }}" "dist/${{ matrix.release_name }}"

      - name: Attach executable to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${{ matrix.release_name }}" --clobber
