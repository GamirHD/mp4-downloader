name: Windows GUI release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-gui:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build GUI executable
        shell: pwsh
        run: ./build-windows-gui.ps1

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp4-downloader-windows
          path: dist/mp4-downloader.exe

      - name: Attach executable to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/mp4-downloader.exe" --clobber
